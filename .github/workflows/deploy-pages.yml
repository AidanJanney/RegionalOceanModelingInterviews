name: Deploy to GitHub Pages

# Deploys the site on every push to main (including dataset update commits).
# Serves the repo root as the Pages artifact so index.html, transcripts/,
# and data/ are all accessible from the published URL.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # serve from repo root

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
